<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="dashboard-grid">

    <!-- Clock Widget -->
    <section class="widget" id="clock-widget">
      <div id="clock">
        <div id="greeting">Good morning, let's get to work!</div>
        <div id="time">00:00:00</div>
        <div id="date">Monday, January 1 2025</div>
      </div>
    </section>

    <!-- Focus Timer Widget -->
    <section class="widget" id="timer-widget">
      <div id="timer-display">25:00</div>
      <div id="timer-controls">
        <button id="btn-start">Start</button>
        <button id="btn-stop" disabled>Stop</button>
        <button id="btn-reset">Reset</button>
      </div>
      <div id="timer-complete" class="timer-complete hidden" role="status" aria-live="polite">
        Session complete! Great work.
      </div>
    </section>

    <!-- To-Do Widget -->
    <section class="widget" id="todo-widget">
      <h2 class="widget-title">To-Do</h2>
      <form id="todo-form" novalidate>
        <input
          id="todo-input"
          type="text"
          placeholder="Add a new task..."
          maxlength="500"
          autocomplete="off"
          aria-label="New task text"
        />
        <button type="submit">Add</button>
      </form>
      <div id="todo-error" class="error-msg hidden" role="alert" aria-live="assertive"></div>
      <ul id="todo-list" aria-label="Task list"></ul>
      <p id="todo-empty" class="empty-state hidden">No tasks yet. Add one above!</p>
    </section>

    <!-- Quick Links Widget -->
    <section class="widget" id="links-widget">
      <h2 class="widget-title">Quick Links</h2>
      <div id="links-grid" aria-label="Quick links grid"></div>
      <p id="links-empty" class="empty-state hidden">No links yet. Add one below!</p>
      <form id="link-form" novalidate>
        <input
          id="link-name-input"
          type="text"
          placeholder="Label"
          maxlength="50"
          autocomplete="off"
          aria-label="Link label"
        />
        <input
          id="link-url-input"
          type="url"
          placeholder="https://..."
          autocomplete="off"
          aria-label="Link URL"
        />
        <button type="submit">Add Link</button>
      </form>
      <div id="link-error" class="error-msg hidden" role="alert" aria-live="assertive"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
